<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess by Zhangir Yestayev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TAB NAVIGATION -->
    <div class="tabs">
        <button class="tab-button active" onclick="openTab('home')">Home</button>
        <button class="tab-button" onclick="openTab('why')">Why Chess Is Important</button>
        <button class="tab-button" onclick="openTab('how')">How Chess Is Important</button>
        <button class="tab-button" onclick="openTab('gallery')">Gallery</button>
        <button class="tab-button" onclick="openTab('books')">Famous Books</button>
        <button class="tab-button" onclick="openTab('openings')">Openings</button>
    </div>

    <!-- HOME TAB -->
    <div id="home" class="tab-content active">
        <h1 class="home-title">Chess.</h1>
        <p class="home-author">By Zhangir Yestayev</p>
    </div>

    <!-- WHY TAB -->
    <div id="why" class="tab-content">
        <h2>Why Chess Is Important</h2>
        <p>[Your text will go here]</p>
    </div>

    <!-- HOW TAB -->
    <div id="how" class="tab-content">
        <h2>How Chess Is Important</h2>
        <p>[Your text will go here]</p>
    </div>

    <!-- GALLERY TAB -->
    <div id="gallery" class="tab-content">
        <h2>Gallery</h2>
        <div class="gallery-container"></div>
    </div>

    <!-- BOOKS TAB -->
    <div id="books" class="tab-content">
        <h2>Famous Chess Books</h2>
        <div class="books-container"></div>
    </div>

    <!-- OPENINGS TAB -->
    <div id="openings" class="tab-content">
        <h2>Chess Openings</h2>
        <div class="openings-container"></div>
    </div>

    <script>
        function openTab(tabName) {
            // Hide all tab content
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active state from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');

            // Highlight clicked button
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
